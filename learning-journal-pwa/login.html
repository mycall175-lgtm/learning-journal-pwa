<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Learning Journal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <h1>Welcome to My Learning Journal</h1>
    <h2>Login</h2>

    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="btn-primary">Login</button>
    </form>

    <p class="or">OR</p>

    <div class="social-login">
      <button class="btn-google">Sign in with Google</button>
      <button class="btn-facebook">Sign in with Facebook</button>
      <button class="btn-github">Sign in with GitHub</button>
    </div>

    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
  </div>

  <!-- Link JS at the bottom to ensure DOM is loaded -->
  <script src="js/login.js"></script>
</body>
</html>
