<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Learning Journal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <h1>Welcome to My Learning Journal</h1>
    <h2>Sign Up</h2>
    <form id="signupForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="btn-primary">Sign Up</button>
    </form>

    <p class="or">OR</p>

    <div class="social-login">
      <button class="btn-google">Sign up with Google</button>
      <button class="btn-facebook">Sign up with Facebook</button>
      <button class="btn-github">Sign up with GitHub</button>
    </div>

    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>
  <script src="js/signup.js"></script>
</body>
</html>
